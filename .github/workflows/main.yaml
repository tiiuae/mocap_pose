name: main

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  tii-deb-build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout mocap_pose
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Checkout ci-scripts
        uses: actions/checkout@v2
        with:
          repository: tiiuae/fogsw-ci-scripts
          path: fogsw-ci-scripts

      - name: Build .deb
        run: |
          set -eux
          mkdir bin
          cd fogsw-ci-scripts/
          ./generate_deb.sh .. ../bin/

          # generate_deb.sh replaces Dockerfile from our repo with its own so we got to go and repair
          # it because otherwise the following Docker build would use the incorrect Dockerfile
          cd ..
          git checkout HEAD -- Dockerfile

      - name: Container metadata
        id: meta # referenced from later step
        uses: docker/metadata-action@v3
        with:
          images: ghcr.io/tiiuae/mocap_pose
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v2
        if: github.event_name == 'push'
        with:
          push: true
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
